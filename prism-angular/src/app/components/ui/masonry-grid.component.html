<div class="flex flex-col">
  <div class="columns-1 sm:columns-2 md:columns-3 lg:columns-4 gap-4 p-4">
    <div *ngFor="let post of posts; let last = last"
         #postElement
         @fadeInUp
         class="break-inside-avoid relative group rounded-2xl overflow-hidden shadow-lg cursor-pointer mb-4 p-[2px] bg-gradient-to-br from-transparent to-transparent hover:from-purple-500 hover:to-pink-500 transition-all duration-500">
      
      <div class="relative rounded-2xl overflow-hidden h-full w-full" [style.backgroundColor]="post.dominantColor || '#1f2937'">
        <a [routerLink]="'/post/' + post.id" class="block w-full h-full">
          <app-lazy-image
            [src]="post.imageUrl"
            [alt]="post.caption"
            className="w-full h-auto object-cover transition-transform duration-500 group-hover:scale-105">
          </app-lazy-image>
          
          <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
            <p class="text-white text-sm line-clamp-2 mb-3">{{ post.caption }}</p>
            <div class="flex items-center space-x-4 text-white/90">
              <div class="flex items-center space-x-1">
                <lucide-icon [name]="HeartIcon" [size]="18" class="fill-current"></lucide-icon>
                <span class="text-sm font-medium">{{ post.likesCount }}</span>
              </div>
              <div class="flex items-center space-x-1">
                <lucide-icon [name]="MessageCircleIcon" [size]="18" class="fill-current"></lucide-icon>
                <span class="text-sm font-medium">{{ post.commentsCount }}</span>
              </div>
            </div>
          </div>
        </a>
      </div>
    </div>
  </div>
  
  <div *ngIf="loadingMore" class="flex justify-center py-6">
    <div class="w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
  </div>
</div>
