<div class="min-h-screen bg-gray-50 dark:bg-black flex flex-col items-center justify-center px-4 py-8">

  <!-- Card -->
  <div class="w-full max-w-sm bg-white dark:bg-black p-10 border border-gray-300 dark:border-gray-800 rounded-sm shadow-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-5xl font-instagram mb-2">Prism</h1>
      <p *ngIf="!isLogin()" class="text-gray-500 text-sm font-semibold mt-4">
        Sign up to see photos and videos from your friends.
      </p>
    </div>

    <!-- Error -->
    <div *ngIf="error()" class="mb-4 p-3 bg-red-100/50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm rounded-lg text-center">
      {{ error() }}
    </div>

    <!-- Success -->
    <div *ngIf="successMessage()" class="mb-4 p-3 bg-blue-50/50 dark:bg-blue-900/20 text-blue-500 text-sm rounded-lg text-center">
      {{ successMessage() }}
    </div>

    <!-- Form -->
    <form (submit)="handleAuth($event)" class="space-y-2">
      <input
        type="email"
        placeholder="Email address"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        name="email"
        required
        [disabled]="loading()"
        class="w-full px-3 py-2 text-sm rounded-sm bg-gray-50 dark:bg-[#121212] border border-gray-300 dark:border-gray-700 focus:border-gray-400 dark:focus:border-gray-500 outline-none transition-all disabled:opacity-50"
      />
      <input
        type="password"
        placeholder="Password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        name="password"
        required
        [disabled]="loading()"
        class="w-full px-3 py-2 text-sm rounded-sm bg-gray-50 dark:bg-[#121212] border border-gray-300 dark:border-gray-700 focus:border-gray-400 dark:focus:border-gray-500 outline-none transition-all disabled:opacity-50"
      />
      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-2 mt-2 rounded-lg bg-[#0095f6] text-white text-sm font-semibold hover:bg-[#1877f2] transition-colors disabled:opacity-70 flex items-center justify-center gap-2">
        <span *ngIf="loading()" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
        {{ isLogin() ? 'Log in' : 'Sign up' }}
      </button>
    </form>

    <!-- Divider -->
    <div class="my-5 flex items-center justify-between">
      <div class="h-px bg-gray-300 dark:bg-gray-700 flex-1"></div>
      <span class="px-4 text-xs font-semibold text-gray-500">OR</span>
      <div class="h-px bg-gray-300 dark:bg-gray-700 flex-1"></div>
    </div>

    <!-- Google -->
    <button
      (click)="handleGoogleAuth()"
      [disabled]="loading()"
      class="w-full py-2 flex items-center justify-center space-x-2 text-[#385185] dark:text-[#E0F1FF] font-semibold text-sm hover:opacity-70 transition-opacity disabled:opacity-50">
      <svg class="w-5 h-5" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span>{{ isLogin() ? 'Log in' : 'Sign up' }} with Google</span>
    </button>

    <!-- Forgot password -->
    <div *ngIf="isLogin()" class="mt-4 text-center">
      <button
        type="button"
        (click)="handleForgotPassword()"
        class="text-xs text-[#00376b] dark:text-[#E0F1FF] hover:opacity-70">
        Forgot password?
      </button>
    </div>
  </div>

  <!-- Toggle login/signup -->
  <div class="w-full max-w-sm mt-4 bg-white dark:bg-black p-6 border border-gray-300 dark:border-gray-800 rounded-sm text-center text-sm">
    {{ isLogin() ? "Don't have an account? " : "Have an account? " }}
    <button (click)="toggleMode()" class="text-[#0095f6] font-semibold hover:opacity-70">
      {{ isLogin() ? 'Sign up' : 'Log in' }}
    </button>
  </div>

</div>
