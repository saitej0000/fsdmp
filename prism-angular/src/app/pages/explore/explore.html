<div *ngIf="loading" class="flex justify-center items-center h-[60vh]">
  <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
</div>

<div *ngIf="!loading" @fadeIn class="container mx-auto px-4 py-8">
  <div class="mb-12 max-w-2xl mx-auto">
    <div class="relative group">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <lucide-icon [name]="SearchIcon" class="h-5 w-5 text-gray-400 group-focus-within:text-purple-500 transition-colors"></lucide-icon>
      </div>
      <input
        type="text"
        [(ngModel)]="searchQuery"
        class="block w-full pl-12 pr-4 py-4 bg-white dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded-full text-gray-900 dark:text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent shadow-lg transition-all"
        placeholder="Search for inspiration, colors, or tags..."
      />
    </div>
  </div>

  <div class="flex space-x-4 mb-8 overflow-x-auto pb-4 scrollbar-hide">
    <button *ngFor="let tag of tags"
      (click)="setTag(tag)"
      class="px-6 py-2 rounded-full bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 whitespace-nowrap hover:border-purple-500 hover:text-purple-500 transition-colors font-medium shadow-sm"
    >
      {{ tag }}
    </button>
  </div>

  <ng-container *ngIf="filteredPosts.length > 0; else noResults">
    <app-masonry-grid 
      [posts]="filteredPosts" 
      [hasMore]="hasMore && !searchQuery" 
      [loadingMore]="loadingMore"
      (loadMore)="loadMorePosts()">
    </app-masonry-grid>
  </ng-container>

  <ng-template #noResults>
    <div class="text-center py-20">
      <h2 class="text-2xl font-bold mb-2">No results found</h2>
      <p class="text-gray-500">Try searching for something else.</p>
    </div>
  </ng-template>
</div>
