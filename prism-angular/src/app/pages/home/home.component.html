<!-- Loading Spinner -->
<div *ngIf="loading" class="flex justify-center items-center h-[60vh]">
  <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
</div>

<!-- Error State -->
<div *ngIf="!loading && error" class="flex flex-col items-center justify-center h-[60vh] text-center px-4">
  <p class="text-red-500 font-semibold mb-2">Something went wrong</p>
  <p class="text-gray-500 text-sm mb-4">{{ error }}</p>
  <button (click)="fetchInitialPosts()" class="px-4 py-2 bg-purple-500 text-white rounded-lg text-sm hover:bg-purple-600 transition-colors">
    Try Again
  </button>
</div>

<!-- Posts Feed -->
<div *ngIf="!loading && !error" @fadeIn class="max-w-xl mx-auto pt-4 md:pt-8 w-full pb-16">

  <!-- Empty state -->
  <div *ngIf="posts.length === 0" class="flex flex-col items-center justify-center h-[60vh] text-center px-4">
    <lucide-icon [name]="CameraIcon" [size]="64" class="text-gray-300 dark:text-gray-700 mb-4 stroke-[1px]"></lucide-icon>
    <h2 class="text-xl font-semibold mb-2">No Posts Yet</h2>
    <p class="text-gray-500 text-sm">Follow people or upload your first photo to get started.</p>
  </div>

  <!-- Post List -->
  <div class="flex flex-col space-y-4 md:space-y-6">
    <app-post-card *ngFor="let post of posts" [post]="post"></app-post-card>
  </div>

  <!-- Load More -->
  <div *ngIf="hasMore && posts.length > 0" class="flex justify-center py-8">
    <button
      *ngIf="!loadingMore"
      (click)="loadMorePosts()"
      class="px-6 py-2 text-sm text-purple-500 border border-purple-500 rounded-full hover:bg-purple-500 hover:text-white transition-colors">
      Load more
    </button>
    <div *ngIf="loadingMore" class="w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
  </div>
</div>
