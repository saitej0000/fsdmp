<div *ngIf="loading" class="flex justify-center items-center h-[60vh]">
  <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
</div>

<div *ngIf="!loading" @fadeIn class="max-w-xl mx-auto pt-4 md:pt-8 w-full block">
  <div class="flex flex-col space-y-4 md:space-y-6">
    <div *ngFor="let post of posts; let i = index">
      <app-post-card [post]="post"></app-post-card>
    </div>
  </div>
  
  <!-- Observer element to trigger loading more -->
  <app-masonry-grid 
    class="hidden" 
    [posts]="[]" 
    [hasMore]="hasMore" 
    [loadingMore]="loadingMore" 
    (loadMore)="loadMorePosts()">
  </app-masonry-grid>

  <div *ngIf="loadingMore" class="flex justify-center py-6">
    <div class="w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
  </div>
</div>
